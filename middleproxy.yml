services:
  middleproxy:
    image: motemere/testproject-middleproxy:latest
    environment:
      - KAFKA_BOOTSTRAPADDRESS=kafka:9092
      - OPENTRACING_JAEGER_UDP_SENDER_HOST=jaeger
      - OPENTRACING_JAEGER_UDP_SENDER_PORT=6831
      - MESSAGE_TOPIC_NAME=testproject
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - MANAGEMENT_TRACING_SAMPLER_PROBABILITY=1.0
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
    ports:
      - 8090:8090
    networks:
      - testproject
    depends_on:
      - kafka
