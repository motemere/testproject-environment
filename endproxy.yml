services:
  endproxy:
    image: motemere/testproject-endproxy:latest
    environment:
      - KAFKA_BOOTSTRAPADDRESS=kafka:9092
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPIC_NAME=testproject
      - ENTRYPOINT_URL=http://entrypoint:8083/api/v1/store/
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - MANAGEMENT_TRACING_SAMPLER_PROBABILITY=1.0
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
    ports:
      - 8099:8099
    networks:
      - testproject
    depends_on:
      - kafka
