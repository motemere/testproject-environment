services:

  db:
    image: mariadb:11.8
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: mariadbrootpsswrd
      MARIADB_DATABASE: testproject-db
      MARIADB_USER: testproject
      MARIADB_PASSWORD: testproject
    volumes: 
      - ./init-db:/docker-entrypoint-initdb.d
      - ./db_data:/var/lib/mysql
    ports:
      - 3306:3306
    networks:
      - testproject
